<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EKSAMEN PREP SYSTEM</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root{--bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a28;--border:#2a2a40;--accent:#4f6ef7;--text:#e8e8f0;--muted:#6b6b8a;--success:#10b981;--danger:#ef4444;--warn:#f59e0b;--font-mono:'Space Mono',monospace;--font-body:'DM Sans',sans-serif;}
  [data-theme="light"]{--bg:#f4f4f8;--surface:#fff;--surface2:#eaeaf2;--border:#d0d0e0;--text:#111120;--muted:#7070a0;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;transition:background .3s,color .3s;}

  header{display:flex;align-items:center;justify-content:space-between;padding:18px 28px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100;}
  .logo{font-family:var(--font-mono);font-size:1.1rem;font-weight:700;letter-spacing:.15em;color:var(--accent);}
  .logo span{color:var(--text);}
  .header-right{display:flex;align-items:center;gap:12px;}
  .theme-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:8px;cursor:pointer;font-family:var(--font-mono);font-size:.75rem;transition:all .2s;}
  .theme-btn:hover{border-color:var(--accent);color:var(--accent);}
  .status-dot{width:8px;height:8px;background:var(--success);border-radius:50%;box-shadow:0 0 8px var(--success);animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  .container{max-width:860px;margin:0 auto;padding:32px 20px;}
  .section-label{font-family:var(--font-mono);font-size:.7rem;letter-spacing:.2em;color:var(--muted);margin-bottom:14px;text-transform:uppercase;}

  .subjects-grid{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:28px;}
  .subject-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:8px;cursor:pointer;font-family:var(--font-mono);font-size:.75rem;letter-spacing:.08em;transition:all .2s;text-transform:uppercase;}
  .subject-btn:hover{border-color:var(--accent);color:var(--accent);}
  .subject-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 0 16px rgba(79,110,247,.35);}

  .mode-tabs{display:flex;margin-bottom:28px;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .mode-tab{flex:1;background:var(--surface);border:none;color:var(--muted);padding:12px;cursor:pointer;font-family:var(--font-body);font-size:.9rem;font-weight:500;transition:all .2s;border-right:1px solid var(--border);}
  .mode-tab:last-child{border-right:none;}
  .mode-tab:hover{color:var(--text);background:var(--surface2);}
  .mode-tab.active{background:var(--accent);color:#fff;}

  .upload-box{border:2px dashed var(--border);border-radius:12px;padding:28px;text-align:center;background:var(--surface);transition:all .2s;margin-bottom:20px;cursor:pointer;position:relative;}
  .upload-box:hover,.upload-box.dragover{border-color:var(--accent);background:var(--surface2);box-shadow:0 0 20px rgba(79,110,247,.15);}
  .upload-box input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
  .upload-icon{font-size:2rem;margin-bottom:8px;}
  .upload-text{font-size:.95rem;color:var(--muted);}
  .upload-text strong{color:var(--accent);}
  .upload-hint{font-size:.8rem;color:var(--muted);margin-top:5px;font-family:var(--font-mono);}

  .file-list{margin-bottom:8px;}
  .file-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;transition:border-color .3s;overflow:hidden;}
  .file-item.reading{border-color:var(--accent);}
  .file-item.done{border-color:var(--success);}
  .file-item.error{border-color:var(--danger);}
  .file-item-main{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;font-size:.88rem;}
  .file-name{display:flex;align-items:center;gap:8px;flex:1;min-width:0;}
  .file-name-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .file-size{color:var(--muted);font-size:.78rem;font-family:var(--font-mono);white-space:nowrap;}
  .file-status{font-size:.75rem;font-family:var(--font-mono);margin-left:6px;white-space:nowrap;}
  .file-status.ok{color:var(--success);}
  .file-status.err{color:var(--danger);}
  .file-status.reading{color:var(--accent);}
  .file-remove{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:2px 6px;border-radius:4px;transition:all .15s;margin-left:8px;}
  .file-remove:hover{color:var(--danger);background:rgba(239,68,68,.1);}
  .file-progress{height:3px;background:var(--border);overflow:hidden;}
  .file-progress-bar{height:100%;background:var(--accent);transition:width .3s;width:0%;}
  .file-progress-bar.done{background:var(--success);}
  .file-progress-bar.error{background:var(--danger);}

  .stats-row{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
  .stat-chip{font-family:var(--font-mono);font-size:.72rem;padding:5px 10px;border-radius:6px;border:1px solid var(--border);color:var(--muted);background:var(--surface);}
  .stat-chip.good{border-color:var(--success);color:var(--success);background:rgba(16,185,129,.07);}
  .stat-chip.info{border-color:var(--accent);color:var(--accent);}

  .quiz-options{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
  .quiz-options label{font-size:.88rem;color:var(--muted);}
  .quiz-options select,.quiz-options input[type="number"]{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:8px;font-family:var(--font-body);font-size:.88rem;}
  .quiz-options input[type="number"]{width:70px;}

  #explainInput{margin-bottom:20px;display:none;}
  #explainTopic{width:100%;padding:12px 14px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:8px;font-family:var(--font-body);font-size:.9rem;}
  #explainTopic:focus{outline:none;border-color:var(--accent);}

  .generate-btn{width:100%;background:var(--accent);border:none;color:#fff;padding:15px;border-radius:10px;cursor:pointer;font-family:var(--font-mono);font-size:.9rem;letter-spacing:.12em;text-transform:uppercase;font-weight:700;transition:all .2s;box-shadow:0 4px 20px rgba(79,110,247,.3);}
  .generate-btn:hover{background:#3a5be8;box-shadow:0 4px 28px rgba(79,110,247,.5);transform:translateY(-1px);}
  .generate-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}

  .output-area{margin-top:28px;display:none;}
  .output-area.visible{display:block;}
  .output-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .output-title{font-family:var(--font-mono);font-size:.8rem;letter-spacing:.15em;color:var(--accent);text-transform:uppercase;}
  .copy-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:.8rem;transition:all .2s;}
  .copy-btn:hover{color:var(--text);border-color:var(--accent);}

  .quiz-container{display:flex;flex-direction:column;gap:16px;}
  .quiz-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;animation:fadeIn .3s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .quiz-q-number{font-family:var(--font-mono);font-size:.72rem;color:var(--accent);margin-bottom:6px;letter-spacing:.1em;}
  .quiz-q{font-weight:600;font-size:.95rem;margin-bottom:14px;line-height:1.5;}
  .quiz-opts{display:flex;flex-direction:column;gap:8px;}
  .quiz-opt{padding:10px 14px;border-radius:8px;border:1px solid var(--border);cursor:pointer;font-size:.88rem;transition:all .15s;background:var(--surface2);}
  .quiz-opt:hover{border-color:var(--accent);color:var(--accent);}
  .quiz-opt.correct{border-color:var(--success);background:rgba(16,185,129,.1);color:var(--success);}
  .quiz-opt.wrong{border-color:var(--danger);background:rgba(239,68,68,.1);color:var(--danger);}
  .quiz-reveal{margin-top:12px;padding:10px 14px;background:var(--surface2);border-radius:8px;font-size:.85rem;color:var(--muted);display:none;}
  .quiz-reveal.visible{display:block;}
  .text-output{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;font-size:.92rem;line-height:1.75;white-space:pre-wrap;}

  .loading{display:none;flex-direction:column;align-items:center;gap:14px;padding:40px;background:var(--surface);border-radius:12px;border:1px solid var(--border);text-align:center;margin-top:20px;}
  .loading.visible{display:flex;}
  .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{font-family:var(--font-mono);font-size:.8rem;color:var(--muted);letter-spacing:.1em;}
  .loading-sub{font-size:.8rem;color:var(--muted);max-width:320px;}

  .divider{border:none;border-top:1px solid var(--border);margin:28px 0;}
  @media(max-width:600px){.mode-tab{font-size:.78rem;padding:10px 4px;}header{padding:14px 16px;}.container{padding:20px 14px;}}
</style>
</head>
<body>
<header>
  <div class="logo">EXAM<span>.</span>PREP</div>
  <div class="header-right">
    <div class="status-dot"></div>
    <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">☀ LYS</button>
  </div>
</header>

<div class="container">
  <div class="section-label">// vælg fag</div>
  <div class="subjects-grid">
    <button class="subject-btn active" onclick="selectSubject(this,'Programmering')">Programmering</button>
    <button class="subject-btn" onclick="selectSubject(this,'Forretningsforståelse')">Forretningsforståelse</button>
    <button class="subject-btn" onclick="selectSubject(this,'Computerarkitektur')">Computerarkitektur</button>
    <!-- NYT FAG: kopiér linjen ovenfor og skift navn -->
  </div>

  <hr class="divider">

  <div class="section-label">// vælg funktion</div>
  <div class="mode-tabs">
    <button class="mode-tab active" onclick="selectMode(this,'quiz')">🎯 Quiz</button>
    <button class="mode-tab" onclick="selectMode(this,'summary')">📋 Opsummering</button>
    <button class="mode-tab" onclick="selectMode(this,'explain')">💡 Forklaring</button>
  </div>

  <div id="quizOptions" class="quiz-options">
    <label>Antal spørgsmål:</label>
    <input type="number" id="numQuestions" value="5" min="1" max="20">
    <label>Type:</label>
    <select id="quizType">
      <option value="multiple">Multiplechoice</option>
      <option value="open">Åbne spørgsmål</option>
      <option value="truefalse">Sandt/Falsk</option>
    </select>
  </div>

  <div id="explainInput">
    <input type="text" id="explainTopic" placeholder="Hvad vil du have forklaret? (fx 'OSI-modellen', 'UML', 'TCP/IP'...)">
  </div>

  <div class="section-label">// upload filer — ubegrænset antal</div>
  <div class="upload-box" id="uploadBox"
    ondragover="event.preventDefault();this.classList.add('dragover')"
    ondragleave="this.classList.remove('dragover')"
    ondrop="handleDrop(event)">
    <input type="file" id="fileInput" multiple accept=".pdf,.pptx,.ppt,.docx,.doc,.txt,.md,.png,.jpg,.jpeg,.webp" onchange="handleFiles(this.files)">
    <div class="upload-icon">📂</div>
    <div class="upload-text">Træk filer hertil eller <strong>klik for at vælge</strong></div>
    <div class="upload-hint">PDF · PPTX · DOCX · TXT · PNG · JPG — billeder læses automatisk 👁</div>
  </div>

  <div class="file-list" id="fileList"></div>
  <div class="stats-row" id="statsRow"></div>

  <button class="generate-btn" id="generateBtn" onclick="generate()">⚡ GENERER</button>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">ANALYSERER...</div>
    <div class="loading-sub" id="loadingSub"></div>
  </div>

  <div class="output-area" id="outputArea">
    <div class="output-header">
      <div class="output-title" id="outputTitle">// resultat</div>
      <button class="copy-btn" onclick="copyOutput()">Kopiér</button>
    </div>
    <div id="outputContent"></div>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let currentTheme = 'dark';
let currentSubject = 'Programmering';
let currentMode = 'quiz';
let uploadedFiles = [];

function toggleTheme() {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', currentTheme === 'light' ? 'light' : '');
  document.getElementById('themeBtn').textContent = currentTheme === 'dark' ? '☀ LYS' : '🌙 MØRK';
}
function selectSubject(btn, name) {
  document.querySelectorAll('.subject-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); currentSubject = name;
}
function selectMode(btn, mode) {
  document.querySelectorAll('.mode-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); currentMode = mode;
  document.getElementById('quizOptions').style.display = mode === 'quiz' ? 'flex' : 'none';
  document.getElementById('explainInput').style.display = mode === 'explain' ? 'block' : 'none';
  document.getElementById('outputArea').classList.remove('visible');
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('uploadBox').classList.remove('dragover');
  handleFiles(e.dataTransfer.files);
}
function handleFiles(files) {
  for (const file of files) {
    if (!uploadedFiles.find(f => f.name === file.name)) {
      const entry = { file, name: file.name, status: 'reading', text: '', images: [], chars: 0, pageCount: 0, imageCount: 0 };
      uploadedFiles.push(entry);
      readFile(entry);
    }
  }
  renderFileList();
}
function removeFile(i) { uploadedFiles.splice(i, 1); renderFileList(); updateStats(); }

async function readFile(entry) {
  const ext = entry.name.split('.').pop().toLowerCase();
  try {
    if (ext === 'pdf') await readPDF(entry);
    else if (['docx','doc'].includes(ext)) await readDOCX(entry);
    else if (['pptx','ppt'].includes(ext)) await readPPTX(entry);
    else if (['txt','md'].includes(ext)) await readText(entry);
    else if (['png','jpg','jpeg','webp'].includes(ext)) await readImage(entry);
    else entry.text = `[Ukendt filtype: ${entry.name}]`;
    entry.chars = entry.text.length;
    entry.status = (entry.chars > 20 || entry.images.length > 0) ? 'done' : 'error';
    if (entry.status === 'error') entry.text = `[Ingen indhold fundet i ${entry.name}]`;
  } catch (err) {
    entry.status = 'error';
    entry.text = `[Fejl: ${err.message}]`;
  }
  renderFileList(); updateStats();
}

async function readPDF(entry) {
  const pdf = await pdfjsLib.getDocument({ data: await entry.file.arrayBuffer() }).promise;
  entry.pageCount = pdf.numPages;
  let allText = '';
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    const pageText = content.items.map(item => item.str).join(' ').trim();
    if (pageText) {
      // Side har tekst — gem som tekst, ikke billede
      allText += `[Side ${i}]\n${pageText}\n\n`;
    } else {
      // Side har INGEN tekst — må være et diagram/billede, render det
      const viewport = page.getViewport({ scale: 1.2 });
      const canvas = document.createElement('canvas');
      canvas.width = viewport.width; canvas.height = viewport.height;
      await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
      entry.images.push({ b64: canvas.toDataURL('image/jpeg', 0.65).split(',')[1], mediaType: 'image/jpeg', description: `PDF side ${i} (diagram)` });
    }
  }
  entry.text = allText;
  entry.imageCount = entry.images.length;
}

async function readDOCX(entry) {
  const result = await mammoth.extractRawText({ arrayBuffer: await entry.file.arrayBuffer() });
  entry.text = result.value.trim();
}

async function readPPTX(entry) {
  const zip = await JSZip.loadAsync(await entry.file.arrayBuffer());
  const slideFiles = Object.keys(zip.files)
    .filter(n => n.match(/^ppt\/slides\/slide\d+\.xml$/))
    .sort((a,b) => parseInt(a.match(/\d+/)?.[0]||0) - parseInt(b.match(/\d+/)?.[0]||0));
  entry.pageCount = slideFiles.length;
  let allText = '';
  for (let si = 0; si < slideFiles.length; si++) {
    const slideNum = si + 1;
    const xml = await zip.files[slideFiles[si]].async('text');
    const slideText = (xml.match(/<a:t[^>]*>([^<]+)<\/a:t>/g)||[]).map(m=>m.replace(/<[^>]+>/g,'')).join(' ').trim();
    if (slideText) {
      allText += `[Slide ${slideNum}]\n${slideText}\n\n`;
    } else {
      // Ingen tekst på slide — send billede hvis der er et
      const relPath = slideFiles[si].replace('slides/slide','slides/_rels/slide') + '.rels';
      if (zip.files[relPath]) {
        const relXml = await zip.files[relPath].async('text');
        const imgPaths = [...relXml.matchAll(/Target="\.\.\/media\/([^"]+)"/g)].map(m=>`ppt/media/${m[1]}`);
        for (const imgPath of imgPaths) {
          if (zip.files[imgPath]) {
            const ext2 = imgPath.split('.').pop().toLowerCase();
            const mime = {png:'image/png',jpg:'image/jpeg',jpeg:'image/jpeg',webp:'image/webp',bmp:'image/png'}[ext2]||'image/png';
            entry.images.push({ b64: await zip.files[imgPath].async('base64'), mediaType: mime, description: `Slide ${slideNum} diagram` });
          }
        }
      }
    }
  }
  entry.text = allText;
  entry.imageCount = entry.images.length;
}

async function readText(entry) {
  entry.text = await new Promise((res,rej) => { const r=new FileReader(); r.onload=e=>res(e.target.result); r.onerror=rej; r.readAsText(entry.file); });
}

async function readImage(entry) {
  const b64 = await new Promise((res,rej) => { const r=new FileReader(); r.onload=e=>res(e.target.result.split(',')[1]); r.onerror=rej; r.readAsDataURL(entry.file); });
  const ext = entry.name.split('.').pop().toLowerCase();
  const mime = ext==='jpg'||ext==='jpeg'?'image/jpeg':ext==='webp'?'image/webp':'image/png';
  entry.images.push({ b64, mediaType: mime, description: `Billede: ${entry.name}` });
  entry.text = `[Billede: ${entry.name}]`;
  entry.imageCount = 1;
}

function renderFileList() {
  const icons = {pdf:'📄',pptx:'📊',ppt:'📊',docx:'📝',doc:'📝',txt:'📃',md:'📃',png:'🖼',jpg:'🖼',jpeg:'🖼',webp:'🖼'};
  document.getElementById('fileList').innerHTML = uploadedFiles.map((e,i) => {
    const ext = e.name.split('.').pop().toLowerCase();
    const size = e.file.size>1048576?(e.file.size/1048576).toFixed(1)+' MB':Math.round(e.file.size/1024)+' KB';
    const statusMap = {reading:['reading','⟳ LÆSER...'],done:['ok',`✓ ${e.chars>0?e.chars.toLocaleString()+'t':''} ${e.imageCount>0?'· 👁 '+e.imageCount:''}`],error:['err','✕ FEJL']};
    const [cls,label] = statusMap[e.status]||['',''];
    const pct = e.status==='done'?100:e.status==='error'?100:40;
    return `<div class="file-item ${e.status}">
      <div class="file-item-main">
        <div class="file-name"><span>${icons[ext]||'📁'}</span><span class="file-name-text">${e.name}</span><span class="file-size">${size}</span><span class="file-status ${cls}">${label}</span></div>
        <button class="file-remove" onclick="removeFile(${i})">✕</button>
      </div>
      <div class="file-progress"><div class="file-progress-bar ${e.status==='done'?'done':e.status==='error'?'error':''}" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}

function updateStats() {
  const done = uploadedFiles.filter(f=>f.status==='done');
  const row = document.getElementById('statsRow');
  if (!done.length){row.innerHTML='';return;}
  const tc=done.reduce((s,f)=>s+f.chars,0), ti=done.reduce((s,f)=>s+f.imageCount,0), tp=done.reduce((s,f)=>s+f.pageCount,0);
  row.innerHTML=`<div class="stat-chip good">✓ ${done.length} fil(er)</div>${tc>0?`<div class="stat-chip info">📝 ${tc.toLocaleString()} tegn</div>`:''}${ti>0?`<div class="stat-chip info">👁 ${ti} billeder</div>`:''}${tp>0?`<div class="stat-chip">📑 ${tp} sider</div>`:''}`;
}

function buildPayload() {
  const done = uploadedFiles.filter(f=>f.status==='done');
  const MAX_TEXT = 120000;
  let used=0, textParts='';
  for (const f of done) {
    if (used < MAX_TEXT) {
      const c = f.text.slice(0, MAX_TEXT - used);
      if (c.trim()) { textParts += `\n\n--- ${f.name} ---\n${c}`; used += c.length; }
    }
  }

  const n = document.getElementById('numQuestions')?.value || 5;
  const qType = document.getElementById('quizType')?.value || 'multiple';
  const topic = document.getElementById('explainTopic')?.value || '';
  const materiale = textParts ? `Her er undervisningsmaterialet:\n${textParts}` : `Brug din generelle viden om "${currentSubject}".`;

  let prompt = '';

  if (currentMode === 'quiz') {
    if (qType === 'multiple') {
      prompt = `${materiale}\n\n---\nOPGAVE: Lav praecis ${n} multiplechoice spoergsmaal paa dansk baseret paa materialet ovenfor. Brug KUN dette format - ingen indledning, ingen forklaring, ingen ekstra tekst. Start direkte med Q1:\n\nQ1: [spoergsmaal]\nA) [svar]\nB) [svar]\nC) [svar]\nD) [svar]\nSvar: A — [kort forklaring]\n\nQ2: [spoergsmaal]\nA) [svar]\nB) [svar]\nC) [svar]\nD) [svar]\nSvar: B — [kort forklaring]\n\nFortsaet indtil Q${n}.`;
    } else if (qType === 'open') {
      prompt = `${materiale}\n\n---\nOPGAVE: Lav praecis ${n} aabne eksamensspoergsmaal paa dansk. Start direkte med Q1:\n\nQ1: [spoergsmaal]\nSvar: [detaljeret svar]\n\nFortsaet indtil Q${n}.`;
    } else {
      prompt = `${materiale}\n\n---\nOPGAVE: Lav praecis ${n} sandt/falsk paastand paa dansk. Start direkte med Q1:\n\nQ1: [paastand]\nSvar: Sandt — [forklaring]\n\nFortsaet indtil Q${n}.`;
    }
  } else if (currentMode === 'summary') {
    prompt = `${materiale}\n\n---\nOPGAVE: Lav en kort og praecis eksamensopsummering paa dansk af materialet ovenfor. Strukturer den med de vigtigste emner, noeglebegreber og eksamensrelevante punkter.`;
  } else {
    const t = topic || `de vigtigste begreber i ${currentSubject}`;
    prompt = `${materiale}\n\n---\nOPGAVE: Forklar foelgende emne grundigt og paedagogisk paa dansk: "${t}". Brug simple forklaringer med eksempler.`;
  }

  return { prompt };
}

async function generate() {
  if (uploadedFiles.some(f=>f.status==='reading')){alert('Vent — filer læses stadig...');return;}
  const btn=document.getElementById('generateBtn');
  const loading=document.getElementById('loading');
  const outputArea=document.getElementById('outputArea');
  btn.disabled=true; loading.classList.add('visible'); outputArea.classList.remove('visible');
  const ti=uploadedFiles.reduce((s,f)=>s+f.imageCount,0);
  document.getElementById('loadingText').textContent='ANALYSERER MATERIALE...';
  document.getElementById('loadingSub').textContent=ti>0?`Analyserer tekst + ${ti} billeder...`:'Analyserer tekst...';

  try {
    const res = await fetch('/api/generate', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(buildPayload())
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    renderOutput(data.text);
    outputArea.classList.add('visible');
    outputArea.scrollIntoView({behavior:'smooth',block:'start'});
  } catch(err) {
    document.getElementById('outputContent').innerHTML=`<div class="text-output" style="color:var(--danger)">Fejl: ${err.message}</div>`;
    outputArea.classList.add('visible');
  }
  btn.disabled=false; loading.classList.remove('visible');
}

function renderOutput(text) {
  const content=document.getElementById('outputContent');
  const title=document.getElementById('outputTitle');
  if (currentMode==='quiz'){title.textContent='// quiz spørgsmål';content.innerHTML=renderQuiz(text);}
  else{title.textContent=currentMode==='summary'?'// opsummering':'// forklaring';content.innerHTML=`<div class="text-output">${esc(text)}</div>`;}
}

function renderQuiz(text) {
  const blocks=text.split(/\n(?=Q\d+:)/);
  if (blocks.length<=1) return `<div class="text-output">${esc(text)}</div>`;
  return '<div class="quiz-container">'+blocks.filter(b=>b.trim()).map((block,i)=>{
    const lines=block.trim().split('\n');
    const question=lines[0].replace(/^Q\d+:\s*/,'');
    const options=lines.filter(l=>/^[A-D]\)/.test(l.trim()));
    const answerLine=lines.find(l=>/^Svar:/.test(l.trim()))||'';
    let html=`<div class="quiz-card"><div class="quiz-q-number">SPØRGSMÅL ${i+1}</div><div class="quiz-q">${esc(question)}</div>`;
    if (options.length>0){
      html+='<div class="quiz-opts">'+options.map(opt=>`<div class="quiz-opt" onclick="handleAnswer(this,'${opt[0]}',\`${escAttr(answerLine)}\`)">${esc(opt)}</div>`).join('')+'</div>';
      html+=`<div class="quiz-reveal">${esc(answerLine)}</div>`;
    } else html+=`<div class="quiz-reveal visible">${esc(lines.slice(1).join('\n'))}</div>`;
    return html+'</div>';
  }).join('')+'</div>';
}

function handleAnswer(el,letter,answerLine){
  const card=el.closest('.quiz-card');
  if(card.querySelector('.correct,.wrong'))return;
  const m=answerLine.match(/Svar:\s*([A-D])/);
  const correct=m?m[1]:null;
  card.querySelectorAll('.quiz-opt').forEach(o=>{
    const l=o.textContent.trim()[0];
    if(l===letter)o.classList.add(letter===correct?'correct':'wrong');
    if(correct&&l===correct)o.classList.add('correct');
  });
  card.querySelector('.quiz-reveal')?.classList.add('visible');
}

function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escAttr(t){return String(t).replace(/`/g,'\\`').replace(/\$/g,'\\$');}
function copyOutput(){
  navigator.clipboard.writeText(document.getElementById('outputContent').innerText).then(()=>{
    const b=document.querySelector('.copy-btn');b.textContent='✓ Kopieret!';
    setTimeout(()=>b.textContent='Kopiér',2000);
  });
}
</script>
